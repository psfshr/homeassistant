###############################################################################
# BASE DEVICE CONFIG ##########################################################
###############################################################################

substitutions:
  name: waveshare-touch-2d0040
  friendly_name: WaveShare Touch LCD 2d0040

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.arduino.memory_type: qio_opi
    board_upload.maximum_ram_size: 524288
  on_boot:
    - delay: 5s
    - lvgl.widget.hide: boot_screen

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: quad
  speed: 80MHz


################################################################################

# Wifi information
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${name}
    password: ${name}
  power_save_mode: NONE

captive_portal:

# Enable Home Assistant API
api:
  encryption:
    key: "y7+oPSvCkFAQtx0elE6fIzDNnEw7+NDULyWp/kus/Xc="
  on_client_connected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.show: lbl_hastatus
  on_client_disconnected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.hide: lbl_hastatus
ota:
  platform: esphome

# Enable logging
logger:
  hardware_uart: uart0
#  level: VERBOSE

###############################################################################
# INPUTS & OUTPUTS ############################################################
###############################################################################

spi:
  - id: spi_lcd
    mosi_pin: GPIO11
    clk_pin: GPIO10
    miso_pin: GPIO12
    interface: any
#  - id: spi_touch
#    mosi_pin: GPIO4
#    clk_pin: GPIO6
#    miso_pin: GPIO3
#    interface: any

i2c:
  sda: GPIO06
  scl: GPIO07
  scan: true
  id: bus_a

output:
  - platform: ledc # Define a PWM output on the ESP32
    pin: GPIO02
    id: backlight_pwm

# Define a monochromatic, dimmable light for the backlight
light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: display_backlight
    restore_mode: ALWAYS_ON

###############################################################################
# VARIABLES & SCRIPTS #########################################################
###############################################################################

globals:
  - id: cpu_speed
    type: int
    restore_value: no
    initial_value: "0"

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time_sync:
      then:
        - logger.log: "Synchronized system clock"

###############################################################################
# HOME ASSISTANT BUTTONS ######################################################
###############################################################################

button:
  - platform: shutdown
    name: "Shutdown"
  - platform: restart
    name: "Restart"
  - platform: safe_mode
    name: "Restart (Safe Mode)"

  - platform: factory_reset
    disabled_by_default: True
    name: "Factory Reset ESP"
    id: factory_reset_all

###############################################################################
# SENSORS #####################################################################
###############################################################################

binary_sensor:
  - platform: touchscreen
    name: LeftScreen
    x_min: 0
    x_max: 119
    y_min: 0
    y_max: 240
    on_press:
      then:
        - lvgl.page.previous:
            animation: OUT_RIGHT
            time: 300ms

  - platform: touchscreen
    name: RightScreen
    x_min: 120
    x_max: 240
    y_min: 0
    y_max: 240
    on_press:
      then:
        - lvgl.page.next:
            animation: OUT_LEFT
            time: 300ms


###############################################################################

#text_sensor:

###############################################################################

sensor:
    #Device UPTIME
  - platform: uptime
    name: Uptime
    id: sys_uptime
    update_interval: 60s

    #Device CPU Speed
  - platform: template
    name: "ESP Cpu Speed"
    accuracy_decimals: 0
    unit_of_measurement: Mhz
    lambda: |-
      return (id(cpu_speed));
    entity_category: "diagnostic"

    #Device Memory
  - platform: template
    id: esp_memory
    icon: mdi:memory
    name: ESP Free Memory
    lambda: return heap_caps_get_free_size(MALLOC_CAP_INTERNAL) / 1024;
    unit_of_measurement: "kB"
    state_class: measurement
    entity_category: "diagnostic"

    #Device RSSI
  - platform: wifi_signal
    name: RSSI
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

    # HomeAssistant Sensors

  - platform: homeassistant
    entity_id: sensor.octopus_rates
    attribute: prev_rate_value
    id: octopus_prev_rate_value

  - platform: homeassistant
    entity_id: sensor.octopus_rates
    attribute: curr_rate_value
    id: octopus_curr_rate_value
    on_value:
      then:
        - lvgl.indicator.update:
            id: val_needle
            value: !lambda return x * 100;
        - lvgl.label.update:
            id: val_text
            text:
              format: "%.0f"
              args: [ 'x * 100' ]

  - platform: homeassistant
    entity_id: sensor.octopus_rates
    attribute: next_rate_value
    id: octopus_next_rate_value
    on_value:
      then:
        - lvgl.indicator.update:
            id: val_needle2
            value: !lambda return x * 100;

################################################################################

touchscreen:
  - platform: cst816
    display: lcd_display
    id: my_touchscreen
    interrupt_pin: GPIO05
    reset_pin: GPIO13
    skip_probe: true
    on_touch:
      - lambda: |-
            ESP_LOGI("Touch:touch : ", "x=%d, y=%d, x_raw=%d, y_raw=%0d",
                touch.x, touch.y, touch.x_raw, touch.y_raw);
    on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming"
            - lvgl.resume:
            - lvgl.page.show:
                id: octopus_page
            - lvgl.widget.redraw:
            - light.turn_on: display_backlight

display:
  - platform: ili9xxx
    model: GC9A01A
    dc_pin: GPIO08
    reset_pin: GPIO14
    id: lcd_display
    spi_id: spi_lcd
    invert_colors: true
    dimensions:
      height: 240
      width: 240
    #show_test_card: true
    auto_clear_enabled: false
    update_interval: never

lvgl:
  displays:
    - lcd_display
  touchscreens:
    - my_touchscreen
  on_idle:
    - timeout: 30s
      then:
        - lvgl.page.show: octopus_page
    - timeout: 5min
      then:
        - logger.log: "LVGL is idle"
        - light.turn_off: display_backlight
        - lvgl.pause:
            show_snow: true

  top_layer:
    widgets:
      - obj:
          id: boot_screen
          x: 0
          y: 0
          width: 100%
          height: 100%
          bg_color: 0xffffff
          bg_opa: COVER
          radius: 0
          pad_all: 0
          border_width: 0
          widgets:
            - spinner:
                align: CENTER
                height: 50
                width: 50
                spin_time: 1s
                arc_length: 60deg
                arc_width: 8
                indicator:
                  arc_color: 0x18bcf2
                  arc_width: 8
          on_press:
            - lvgl.widget.hide: boot_screen
      - obj:
          id: icon_screen
          x: 0
          y: 0
          width: 100%
          height: 100%
          bg_color: 0xffffff
          bg_opa: TRANSP
          radius: 0
          pad_all: 0
          border_width: 0
          widgets:
            - label:
                text: "\uF1EB"
                id: lbl_hastatus
                align: BOTTOM_MID
                text_align: CENTER
                text_color: 0x0000FF

  pages:
    # - id: main_page
    #   skip: true
    #   widgets:
    #     - label:
    #         align: CENTER
    #         text: 'Hello World!'
    - id: octopus_page
      widgets:
        - obj:
            height: 240
            width: 240
            align: CENTER
            bg_color: 0xFFFFFF
            border_width: 0
            pad_all: 0
            widgets:
              - meter:
                  height: 100%
                  width: 100%
                  border_width: 0
                  pad_all: 0
                  bg_opa: TRANSP
                  align: CENTER
                  scales:
                    - range_from: -20
                      range_to: 100
                      angle_range: 120
                      rotation: 120
                      ticks:
                        width: 1
                        count: 13
                        length: 5
                        color: 0x000000
                        major:
                          stride: 2
                          width: 2
                          length: 10
                          color: 0x404040
                          label_gap: 10
                      indicators:
                        - line:
                            id: val_needle
                            color: 0x0000bd
                            width: 4
                            r_mod: 12
                            value: 0
                        - line:
                            id: val_needle2
                            color: 0x666666
                            width: 2
                            r_mod: 12
                            value: 0
                        - tick_style:
                            start_value: -10
                            end_value: 100
                            color_start: 0x00bd00
                            color_end: 0xbd0000
                            width: 1
              - obj: # to cover the middle part of meter indicator line
                  height: 146
                  width: 146
                  radius: 72
                  align: CENTER
                  border_width: 0
                  bg_color: 0xFFFFFF
                  pad_all: 0
              - label: # gauge numeric indicator
                  id: val_text
                  text_font: montserrat_26
                  align: CENTER
                  x: -35
                  y: 0
                  text: "0"
              - label: # gauge numeric indicator
                  text_font: montserrat_14
                  align: CENTER
                  x: -35
                  y: 20
                  text: "p/kWh"

