###############################################################################
# BASE DEVICE CONFIG ##########################################################
###############################################################################

substitutions:
  name: waveshare-touch-2d0040
  friendly_name: WaveShare Touch LCD 2d0040

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.arduino.memory_type: qio_opi
    board_upload.maximum_ram_size: 524288

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: quad
  speed: 80MHz


################################################################################

# Wifi information
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${name}
    password: ${name}

captive_portal:

# Enable Home Assistant API
api:
  encryption:
    key: "y7+oPSvCkFAQtx0elE6fIzDNnEw7+NDULyWp/kus/Xc="
ota:
  platform: esphome

# Enable logging
logger:

###############################################################################
# INPUTS & OUTPUTS ############################################################
###############################################################################

spi:
  - id: spi_lcd
    mosi_pin: GPIO11
    clk_pin: GPIO10
    miso_pin: GPIO12
    interface: any
#  - id: spi_touch
#    mosi_pin: GPIO4
#    clk_pin: GPIO6
#    miso_pin: GPIO3
#    interface: any

i2c:
  sda: GPIO06
  scl: GPIO07
  scan: true
  id: bus_a

output:
  - platform: ledc # Define a PWM output on the ESP32
    pin: GPIO02
    id: backlight_pwm

# Define a monochromatic, dimmable light for the backlight
light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: display_backlight
    restore_mode: ALWAYS_ON

switch:
  - platform: template
    name: Antiburn
    id: switch_antiburn
    icon: mdi:television-shimmer
    optimistic: true
    entity_category: "config"
    turn_on_action:
      - logger.log: "Starting Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
            - delay: 1s
      - lvgl.pause:
          show_snow: true
    turn_off_action:
      - logger.log: "Stopping Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
            - delay: 1s
            - lvgl.pause:

###############################################################################
# VARIABLES & SCRIPTS #########################################################
###############################################################################

globals:
  - id: cpu_speed
    type: int
    restore_value: no
    initial_value: "0"

number:
  - platform: template
    name: LVGL Screen timeout
    optimistic: true
    id: display_timeout
    unit_of_measurement: "s"
    initial_value: 45
    restore_value: true
    min_value: 10
    max_value: 180
    step: 5
    mode: box

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time_sync:
      then:
        - logger.log: "Synchronized system clock"

###############################################################################
# HOME ASSISTANT BUTTONS ######################################################
###############################################################################

button:
  - platform: shutdown
    name: "Shutdown"
  - platform: restart
    name: "Restart"
  - platform: safe_mode
    name: "Restart (Safe Mode)"

  - platform: factory_reset
    disabled_by_default: True
    name: "Factory Reset ESP"
    id: factory_reset_all

###############################################################################
# SENSORS #####################################################################
###############################################################################

binary_sensor:
  - platform: touchscreen
    name: LeftScreen
    x_min: 0
    x_max: 119
    y_min: 0
    y_max: 240
    on_press:
      then:
        - lvgl.page.previous:
            animation: OUT_RIGHT
            time: 300ms

  - platform: touchscreen
    name: RightScreen
    x_min: 120
    x_max: 240
    y_min: 0
    y_max: 240
    on_press:
      then:
        - lvgl.page.next:
            animation: OUT_LEFT
            time: 300ms


###############################################################################

#text_sensor:

###############################################################################

sensor:
    #Device UPTIME
  - platform: uptime
    name: Uptime
    id: sys_uptime
    update_interval: 60s

    #Device CPU Speed
  - platform: template
    name: "ESP Cpu Speed"
    accuracy_decimals: 0
    unit_of_measurement: Mhz
    lambda: |-
      return (id(cpu_speed));
    entity_category: "diagnostic"

    #Device Memory
  - platform: template
    id: esp_memory
    icon: mdi:memory
    name: ESP Free Memory
    lambda: return heap_caps_get_free_size(MALLOC_CAP_INTERNAL) / 1024;
    unit_of_measurement: "kB"
    state_class: measurement
    entity_category: "diagnostic"

    #Device RSSI
  - platform: wifi_signal
    name: RSSI
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"


  - platform: homeassistant
    entity_id: sensor.octopus_rates
    attribute: prev_rate_value
    id: octopus_prev_rate_value

  - platform: homeassistant
    entity_id: sensor.octopus_rates
    attribute: curr_rate_value
    id: octopus_curr_rate_value
    on_value:
      - lvgl.indicator.update:
          id: val_needle
          value: !lambda return x;
      - lvgl.label.update:
          id: val_text
          text:
            format: "%.0f"
            args: [ 'x' ]

  - platform: homeassistant
    entity_id: sensor.octopus_rates
    attribute: next_rate_value
    id: octopus_next_rate_value


################################################################################

touchscreen:
  - platform: cst816
    display: lcd_display
    id: my_touchscreen
    interrupt_pin: GPIO05
    reset_pin: GPIO13
    on_touch:
      - lambda: |-
            ESP_LOGI("Touch:touch : ", "x=%d, y=%d, x_raw=%d, y_raw=%0d",
                touch.x,
                touch.y,
                touch.x_raw,
                touch.y_raw
                );
    on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming"
            - lvgl.resume:
#s            - switch.turn_off: switch_antiburn
            - lvgl.widget.redraw:
            - light.turn_on: display_backlight

display:
  - platform: ili9xxx
    model: GC9A01A
    dc_pin: GPIO08
    reset_pin: GPIO14
    id: lcd_display
    spi_id: spi_lcd
    invert_colors: true
    dimensions:
      height: 240
      width: 240
    #show_test_card: true
    auto_clear_enabled: false
    update_interval: never

lvgl:
  displays:
    - lcd_display
  touchscreens:
    - my_touchscreen
  on_idle:
    timeout: !lambda "return (id(display_timeout).state * 1000);"
    then:
      - logger.log: "LVGL is idle"
#      - switch.turn_on: switch_antiburn
      - light.turn_off: display_backlight
      - lvgl.pause:
          show_snow: true

  pages:
    - id: main_page
    #   widgets:
    #     - label:
    #         align: CENTER
    #         text: 'Hello World!'
    # - id: gauge_page
      widgets:
        - obj:
            height: 240
            width: 240
            align: CENTER
            bg_color: 0xFFFFFF
            border_width: 0
            pad_all: 4
            widgets:
              - meter:
                  height: 100%
                  width: 100%
                  border_width: 0
                  bg_opa: TRANSP
                  align: CENTER
                  scales:
                    - range_from: -0.1
                      range_to: 1
                      angle_range: 180 # sets the total angle to 180 = starts mid left and ends mid right
                      ticks:
                        count: 0
                      indicators:
                        - line:
                            id: val_needle
                            width: 8
                            r_mod: 12 # sets line length by this much difference from the scale default radius
                            value: -2
                        - arc: # first half of the scale background
                            color: 0x00FF00
                            r_mod: 10 # radius difference from the scale default radius
                            width: 31
                            start_value: -0.1
                            end_value: 0
                        - arc: # second half of the scale background
                            color: 0xFF3000
                            r_mod: 10
                            width: 31
                            start_value: 0
                            end_value: 1
              - obj: # to cover the middle part of meter indicator line
                  height: 146
                  width: 146
                  radius: 73
                  align: CENTER
                  border_width: 0
                  bg_color: 0xFFFFFF
                  pad_all: 0
              - label: # gauge numeric indicator
                  id: val_text
                  text_font: montserrat_48
                  align: CENTER
                  y: -5
                  text: "0"
              - label: # lower range indicator
                  text_font: montserrat_18
                  align: CENTER
                  y: 8
                  x: -90
                  text: "-0.1"
              - label: # higher range indicator
                  text_font: montserrat_18
                  align: CENTER
                  y: 8
                  x: 90
                  text: "+1"